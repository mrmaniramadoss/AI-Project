version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - truck_data:/data
    environment:
      - DATABASE_PATH=/data/app.db
      - JWT_SECRET_KEY=change-this-in-production
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  truck_data:
